name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Цей крок - найкраще, що підтримує GitHub для Gradle
      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Якщо в тебе немає файлу gradlew, ми просимо GitHub 
          # самостійно завантажити та налаштувати Gradle
          gradle-version: '8.5'
          arguments: assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
