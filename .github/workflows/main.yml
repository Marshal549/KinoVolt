name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Виводимо структуру папок, щоб побачити, де лежать файли
      - name: List files
        run: ls -R

      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      # Запускаємо з максимальними подробицями
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info
