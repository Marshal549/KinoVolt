name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        # Ми прибрали окремий крок "Setup Gradle", 
        # тому що він викликає конфлікти з версіями.
        # Використовуємо стандартний виклик через gradlew
        run: chmod +x gradlew && ./gradlew assembleDebug
